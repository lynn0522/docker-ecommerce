# ==============================
# ??????
# ==============================
spring.profiles.active=prod

# ==============================
# ?????????????
# ==============================
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ecommerce_prod}?useSSL=true&requireSSL=true&verifyServerCertificate=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&useUnicode=true&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:prod_user}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# ???????
# ==============================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=30000
spring.datasource.hikari.pool-name=ProductionHikariPool

# ==============================
# JPA????
# ==============================
spring.jpa.hibernate.ddl-auto=validate  # ????????????
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ==============================
# ??????
# ==============================
logging.level.root=WARN
logging.level.com.ecommerce=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=ERROR

# JSON????????????
logging.pattern.console={"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSSZ}","level":"%level","service":"${spring.application.name}","thread":"%thread","logger":"%logger{40}","message":"%replace(%msg){'[\"\\\\]',''}","exception":"%replace(%ex){'[\"\\\\]',''}"}%n

logging.file.name=/app/logs/application.log
logging.file.max-size=100MB
logging.file.max-history=60
logging.logback.rollingpolicy.max-file-size=100MB
logging.logback.rollingpolicy.max-history=60
logging.logback.rollingpolicy.total-size-cap=10GB

# ==============================
# ????
# ==============================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.metrics.export.prometheus.enabled=true

# ==============================
# ????
# ==============================
# ??????H2???
spring.h2.console.enabled=false

# ??????
spring.devtools.restart.enabled=false