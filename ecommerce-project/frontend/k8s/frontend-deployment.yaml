# 前端K8s部署配置（Deployment + Service）
# 1. Deployment：管理前端Pod，实现多副本、自愈
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-frontend
  namespace: default
  labels:
    app: ecommerce-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-frontend
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ecommerce-frontend
    spec:
      containers:
      - name: ecommerce-frontend
        # 用本地构建的完整镜像（内置dist文件）
        image: ecommerce-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "0.5"
            memory: "512Mi"
          requests:
            cpu: "0.2"
            memory: "256Mi"
        command: ["nginx", "-g", "daemon off;"]

---
# 2. Service：暴露前端Pod，供外部访问
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-frontend-service
  namespace: default
spec:
  selector:
    app: ecommerce-frontend
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30081
    protocol: TCP